<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{employee/layout :: layout('従業員一覧', ~{::main})}">
<head>
</head>
<body>
<main>
  <table class="table table-striped">
    <thead>
    <tr>
      <th>従業員名</th>
      <th>入社日</th>
      <th>扶養人数</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="employee : ${employees}">
      <td>
        <a href="detail.html" th:href="@{/employees/detail(id=${employee.id})}">
          <span th:text="${employee.name}">山田太郎</span>
        </a>
      </td>
      <td>
        <span th:text="${#dates.format(employee.hireDate, 'yyyy/MM/dd')}">2016/12/1</span>
      </td>
      <td>
        <span th:text="${employee.dependentsCount + '人'}">3人</span>
      </td>
    </tr>
    </tbody>
  </table>

  <nav class="text-center">
    <ul class="pagination">
      <!-- 前のページ -->
      <li th:class="${currentPage == 1} ? 'disabled'">
        <a th:href="@{/employees(page=${currentPage - 1})}">&laquo;</a>
      </li>

      <!-- ページ番号 -->
      <li th:each="i : ${#numbers.sequence(1, totalPages)}"
          th:class="${i == currentPage} ? 'active'">
        <a th:href="@{/employees(page=${i})}" th:text="${i}">1</a>
      </li>

      <!-- 次のページ -->
      <li th:class="${currentPage == totalPages} ? 'disabled'">
        <a th:href="@{/employees(page=${currentPage + 1})}">&raquo;</a>
      </li>
    </ul>
  </nav>
</main>
</body>
</html>
