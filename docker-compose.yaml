services:
  db:
    image: postgres:17
    container_name: ex-management-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student
      TZ: "Asia/Tokyo"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./:/work

volumes:
  postgres-data:
